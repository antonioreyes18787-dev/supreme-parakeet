<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notion Workflows 201 — A 1-hour intro to connected systems</title>
<style>
  :root {
    --bg: #ffffff;
    --sidebar-bg: #f7f6f3;
    --text-primary: #37352f;
    --text-secondary: #787774;
    --text-tertiary: #9b9a97;
    --border: #e9e9e7;
    --border-strong: #d3d1cb;
    --hover: rgba(55,53,47,0.08);
    --hover-light: rgba(55,53,47,0.04);
    --selected: rgba(35,131,226,0.14);
    --blue: #2383e2;
    --blue-text: #1f6fc0;
    --green: #448361;
    --red: #d44c47;
    --orange: #d9730d;

    --callout-gray-bg: #f1f1ef;
    --callout-brown-bg: #f4eeee;
    --callout-blue-bg: #ddebf1;
    --callout-yellow-bg: #fdecc8;
    --callout-green-bg: #ddedea;
    --callout-red-bg: #fbe4e4;
    --callout-purple-bg: #eae4f2;
    --callout-pink-bg: #f4dfeb;

    --code-bg: rgba(135,131,120,0.15);
    --code-text: #eb5757;

    --shadow-sm: rgba(15,15,15,0.05) 0px 0px 0px 1px, rgba(15,15,15,0.1) 0px 3px 6px, rgba(15,15,15,0.2) 0px 9px 24px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
    color: var(--text-primary);
    background: var(--bg);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 14px 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .workspace-icon {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: linear-gradient(135deg, #2383e2 0%, #1f6fc0 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  .workspace-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .workspace-meta {
    padding: 0 14px 12px 14px;
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .badge-tag {
    display: inline-block;
    background: var(--callout-blue-bg);
    color: var(--blue-text);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-left: 4px;
  }

  .sidebar-section {
    padding: 8px 6px;
    overflow-y: auto;
    flex: 1;
  }

  .sidebar-section::-webkit-scrollbar { width: 6px; }
  .sidebar-section::-webkit-scrollbar-thumb { background: rgba(55,53,47,0.15); border-radius: 3px; }

  .sidebar-label {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 500;
    padding: 8px 10px 4px 10px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    margin: 1px 4px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-primary);
    user-select: none;
    transition: background 0.05s ease;
  }

  .sidebar-item:hover { background: var(--hover); }
  .sidebar-item.active { background: var(--selected); font-weight: 500; }
  .sidebar-item .chev { width: 14px; color: var(--text-tertiary); font-size: 10px; }
  .sidebar-item .emoji { width: 18px; text-align: center; font-size: 14px; }
  .sidebar-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-item .num { color: var(--text-tertiary); font-size: 12px; }

  .sidebar-children { padding-left: 14px; }
  .sidebar-children .sidebar-item { font-size: 13.5px; }

  .sidebar-section details > summary { list-style: none; }
  .sidebar-section details > summary::-webkit-details-marker { display: none; }
  .sidebar-section details > summary::marker { content: ''; }
  .sidebar-section details > summary .chev {
    display: inline-block;
    transition: transform 0.15s ease;
    transform: rotate(0deg);
  }
  .sidebar-section details:not([open]) > summary .chev {
    transform: rotate(-90deg);
  }

  .sidebar-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-tertiary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .test-btn {
    background: var(--text-primary);
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .test-btn:hover { background: #1f1d1a; }
  .test-btn.secondary {
    background: white;
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }
  .test-btn.secondary:hover { background: var(--hover-light); }

  /* ---------- MAIN ---------- */
  .main {
    background: var(--bg);
    overflow-y: auto;
    position: relative;
  }

  .topbar {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .breadcrumb { display: flex; gap: 6px; align-items: center; }
  .breadcrumb .sep { color: var(--text-tertiary); }
  .breadcrumb .crumb { color: var(--text-secondary); }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    max-width: 300px;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    width: 0%;
    transition: width 0.3s ease;
  }

  .nav-controls { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover { background: var(--hover); color: var(--text-primary); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .slide-counter { font-size: 13px; color: var(--text-tertiary); padding: 0 8px; min-width: 50px; text-align: center; }

  .page {
    max-width: 740px;
    margin: 0 auto;
    padding: 60px 80px 120px 80px;
    animation: pageIn 0.25s ease;
  }

  @keyframes pageIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-icon {
    font-size: 70px;
    line-height: 1;
    margin-bottom: 14px;
    user-select: none;
  }

  .page-cover {
    margin: -60px -80px 0 -80px;
    height: 160px;
    margin-bottom: 60px;
  }
  .page-cover.a { background: linear-gradient(135deg, #c5d8e8 0%, #a8c5e0 50%, #2383e2 100%); }
  .page-cover.b { background: linear-gradient(135deg, #d4e6c8 0%, #b8d4a8 50%, #98b888 100%); }
  .page-cover.c { background: linear-gradient(135deg, #e8d4f0 0%, #d0b8e0 50%, #b89cc8 100%); }
  .page-cover.d { background: linear-gradient(135deg, #ffe9b3 0%, #f8c8a3 50%, #e8a8c0 100%); }
  .page-cover.e { background: linear-gradient(135deg, #f4d0c8 0%, #ec9c98 50%, #d47880 100%); }
  .page-cover.f { background: linear-gradient(135deg, #c8e0e8 0%, #88c0d0 50%, #2383e2 100%); }

  h1.page-title {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 20px 0;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .page p, .page li {
    font-size: 16px;
    line-height: 1.6;
    color: var(--text-primary);
    margin: 6px 0;
  }

  .page h2 {
    font-size: 26px;
    font-weight: 600;
    margin: 28px 0 8px 0;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .page h3 {
    font-size: 20px;
    font-weight: 600;
    margin: 20px 0 6px 0;
    line-height: 1.3;
  }

  .page ul, .page ol { padding-left: 26px; margin: 6px 0; }
  .page li { margin: 4px 0; }

  .page strong { font-weight: 600; color: var(--text-primary); }

  .page code, .inline-code {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Menlo, Consolas, "PT Mono", "Liberation Mono", Courier, monospace;
    font-size: 13.6px;
  }

  .kbd {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--callout-gray-bg);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  /* Callout */
  .callout {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-radius: 6px;
    margin: 16px 0;
    font-size: 15px;
    line-height: 1.55;
  }
  .callout .icon { font-size: 20px; line-height: 1.2; flex-shrink: 0; }
  .callout-gray { background: var(--callout-gray-bg); }
  .callout-blue { background: var(--callout-blue-bg); }
  .callout-yellow { background: var(--callout-yellow-bg); }
  .callout-green { background: var(--callout-green-bg); }
  .callout-red { background: var(--callout-red-bg); }
  .callout-purple { background: var(--callout-purple-bg); }

  /* Toggle */
  details.toggle { margin: 8px 0; }
  details.toggle summary {
    list-style: none;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    gap: 6px;
    align-items: flex-start;
    font-weight: 500;
  }
  details.toggle summary::-webkit-details-marker { display: none; }
  details.toggle summary::before {
    content: "▶";
    color: var(--text-tertiary);
    font-size: 11px;
    transition: transform 0.15s ease;
    margin-top: 5px;
  }
  details.toggle[open] summary::before { transform: rotate(90deg); }
  details.toggle > div { padding: 4px 0 4px 18px; }

  hr.div { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 14px 0; }
  .cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    background: white;
    font-size: 14px;
  }
  .card .card-title { font-weight: 600; margin-bottom: 6px; font-size: 14px; }
  .card .card-meta { font-size: 12px; color: var(--text-tertiary); }

  /* Database mocks */
  .db-mock {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 14px 0;
    font-size: 13.5px;
  }
  .db-row {
    display: grid;
    grid-template-columns: 2.4fr 1fr 1fr 1.3fr;
    border-bottom: 1px solid var(--border);
  }
  .db-row.cols-3 { grid-template-columns: 2fr 1fr 1.3fr; }
  .db-row:last-child { border-bottom: none; }
  .db-row > div {
    padding: 7px 10px;
    border-right: 1px solid var(--border);
  }
  .db-row > div:last-child { border-right: none; }
  .db-header {
    background: var(--callout-gray-bg);
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 12.5px;
  }

  .db-mock-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 6px 10px;
    background: var(--callout-gray-bg);
    border-bottom: 1px solid var(--border);
  }

  .pill {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.5;
  }
  .pill-blue { background: var(--callout-blue-bg); color: #183347; }
  .pill-yellow { background: var(--callout-yellow-bg); color: #5e421e; }
  .pill-green { background: var(--callout-green-bg); color: #1c3a2e; }
  .pill-gray { background: var(--callout-gray-bg); color: var(--text-secondary); }
  .pill-red { background: var(--callout-red-bg); color: #5d1d1d; }
  .pill-purple { background: var(--callout-purple-bg); color: #3c2860; }
  .pill-orange { background: #faebdd; color: #6b3a16; }

  /* Synced block visual */
  .synced-block {
    border-left: 3px solid var(--red);
    background: rgba(212,76,71,0.06);
    padding: 10px 12px;
    border-radius: 0 4px 4px 0;
    margin: 6px 0;
    font-size: 14px;
    position: relative;
  }
  .synced-block::after {
    content: "🔁 Synced";
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 11px;
    color: var(--red);
    font-weight: 600;
  }

  /* Linked DB visual */
  .linked-marker {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--blue-text);
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  /* Relation arrow */
  .relation-arrows {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    margin: 14px 0;
  }
  .relation-arrow {
    color: var(--blue);
    font-size: 22px;
    text-align: center;
    line-height: 1;
  }

  /* Form mock */
  .form-mock {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    background: white;
    margin: 14px 0;
    box-shadow: var(--shadow-sm);
    max-width: 420px;
  }
  .form-mock h4 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; }
  .form-mock .desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
  .form-mock .form-field {
    margin-bottom: 10px;
  }
  .form-mock .form-label {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .form-mock .form-input {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 13.5px;
    color: var(--text-tertiary);
    background: var(--callout-gray-bg);
  }
  .form-mock .form-submit {
    background: var(--text-primary);
    color: white;
    padding: 7px 14px;
    border-radius: 4px;
    font-size: 13.5px;
    border: none;
    margin-top: 4px;
    font-family: inherit;
  }

  /* Automation rule visual */
  .auto-rule {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin: 12px 0;
    background: white;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 12px;
    font-size: 14px;
    align-items: center;
  }
  .auto-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Button block visual */
  .btn-block {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--callout-blue-bg);
    color: var(--blue-text);
    border-radius: 6px;
    font-weight: 500;
    font-size: 14px;
    border: 1px solid rgba(35,131,226,0.25);
    margin: 8px 0;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-block:hover { background: rgba(35,131,226,0.18); }

  /* AI bubble */
  .ai-bubble {
    background: linear-gradient(135deg, var(--callout-purple-bg), var(--callout-blue-bg));
    border-radius: 10px;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 14.5px;
    border: 1px solid rgba(35,131,226,0.18);
  }
  .ai-bubble .ai-q {
    color: var(--text-primary);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .ai-bubble .ai-a {
    color: var(--text-secondary);
    font-size: 13.5px;
    line-height: 1.5;
  }
  .ai-bubble .ai-icon {
    display: inline-block;
    background: white;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--blue-text);
    margin-right: 4px;
  }

  /* Time tag */
  .time-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--callout-blue-bg);
    color: var(--blue-text);
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Block demo */
  .block-demo {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 6px 0;
    font-size: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .block-demo .handle { color: var(--text-tertiary); font-size: 14px; }

  /* TEST MODE */
  .test-page {
    max-width: 760px;
    margin: 0 auto;
    padding: 50px 60px 100px 60px;
  }

  .test-intro {
    background: var(--callout-blue-bg);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 28px;
  }

  .question {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 22px;
    margin-bottom: 14px;
    background: white;
    transition: border-color 0.15s ease;
  }
  .question:hover { border-color: var(--border-strong); }

  .q-num {
    color: var(--text-tertiary);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 16.5px;
    font-weight: 500;
    margin-bottom: 14px;
    line-height: 1.4;
  }

  .options { display: flex; flex-direction: column; gap: 6px; }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 14.5px;
    transition: all 0.1s ease;
  }
  .option:hover { background: var(--hover-light); }
  .option input { margin: 0; cursor: pointer; accent-color: var(--blue); }
  .option.selected { border-color: var(--blue); background: rgba(35,131,226,0.05); }
  .option.correct { border-color: var(--green); background: var(--callout-green-bg); }
  .option.incorrect { border-color: var(--red); background: var(--callout-red-bg); }
  .option.reveal-correct { border-color: var(--green); background: var(--callout-green-bg); }

  .submit-row {
    margin-top: 28px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .submit-btn {
    background: var(--text-primary);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 5px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .submit-btn:hover { background: #1f1d1a; }
  .submit-btn:disabled { background: var(--text-tertiary); cursor: not-allowed; }

  .results {
    background: var(--callout-yellow-bg);
    padding: 22px 24px;
    border-radius: 8px;
    margin-bottom: 28px;
  }
  .results.pass { background: var(--callout-green-bg); }
  .results.fail { background: var(--callout-red-bg); }
  .results h2 { margin: 0 0 6px 0; font-size: 24px; }
  .results .score { font-size: 40px; font-weight: 700; margin: 6px 0; }

  .explanation {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--callout-gray-bg);
    border-radius: 5px;
    font-size: 13.5px;
    color: var(--text-secondary);
  }
  .explanation strong { color: var(--text-primary); }

  .hidden { display: none !important; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .page { padding: 30px 22px 100px 22px; }
    .page-cover { margin: -30px -22px 0 -22px; }
    h1.page-title { font-size: 32px; }
    .test-page { padding: 30px 22px 80px 22px; }
    .cols, .cols-3 { grid-template-columns: 1fr; }
    .relation-arrows { grid-template-columns: 1fr; }
    .relation-arrow { transform: rotate(90deg); }
    .db-row { grid-template-columns: 1.5fr 1fr 1fr; font-size: 12px; }
    .db-row > div:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="workspace-icon">N</div>

const QUIZ = [
  {
    q: "What's the main benefit of using a synced block?",
    options: [
      "It saves storage space",
      "Edit it in one place and every copy updates everywhere",
      "It auto-translates content",
      "It hides content from search"
    ],
    correct: 1,
    explain: "Synced blocks let you reuse content across pages. Update the source once, every linked instance updates instantly."
  },
  {
    q: "A linked database is best described as...",
    options: [
      "A brand-new database with its own data",
      "A view of an existing database in another location, with its own filters/sort/view type",
      "A database that's connected to a Google Sheet",
      "A database that's locked from editing"
    ],
    correct: 1,
    explain: "A linked database shows the same source data somewhere else. You can give that location a different filter or view, but the data is shared."
  },
  {
    q: "What does a relation property do?",
    options: [
      "Calculates a total across rows",
      "Sends a notification when a row changes",
      "Connects rows in one database to rows in another",
      "Hides a column based on permissions"
    ],
    correct: 2,
    explain: "Relations link records together. They're step one — rollups (which summarize across that link) are step two."
  },
  {
    q: "What does a rollup property do?",
    options: [
      "Renames a column based on its content",
      "Pulls data from related rows and summarizes it (count, percent, sum, etc.)",
      "Generates a unique ID for each row",
      "Translates a property to another language"
    ],
    correct: 1,
    explain: "Rollups reach across a relation and aggregate. Use them to show '# of tasks', '% done', or 'project end date' on a project row."
  },
  {
    q: "Why use a form on a Notion database?",
    options: [
      "To print the database",
      "To let people submit info that becomes a database row, without seeing the rest of the database",
      "To apply a template automatically",
      "To lock the database from editing"
    ],
    correct: 1,
    explain: "Forms are a clean public-facing way to collect submissions. The submitter never sees the underlying data."
  },
  {
    q: "A Notion database automation is built from...",
    options: [
      "Triggers (when something happens) and actions (do something)",
      "Plugins downloaded from a marketplace",
      "Email schedules only",
      "Code snippets pasted into the page"
    ],
    correct: 0,
    explain: "Every automation has a When (trigger) and a Then (action). For example: when a row is added → set Status to 'Triage'."
  },
  {
    q: "When should you reach for a button block instead of an automation?",
    options: [
      "When the action should run on its own with no human involved",
      "When you want a person to click to run a small repeating action (like 'create a pre-filled task')",
      "When you need to send email",
      "Buttons and automations do the exact same thing"
    ],
    correct: 1,
    explain: "Buttons are for human-driven actions. Automations are for hands-off rules that run when conditions are met."
  },
  {
    q: "A database template is...",
    options: [
      "A backup copy of the database",
      "A pre-filled new row whose properties and content come from a saved structure",
      "A formula that runs once",
      "An automation that triggers on schedule"
    ],
    correct: 1,
    explain: "Database templates set the default content (and even property values) for new rows — perfect for meeting notes, bug reports, or 1:1s."
  },
  {
    q: "You want each task to live under exactly one project, and you want each project to show its task progress. What do you use?",
    options: [
      "Two separate workspaces",
      "A relation between Tasks and Projects, plus a rollup on Projects to summarize the related tasks",
      "A formula on the Tasks database",
      "A synced block of the task list"
    ],
    correct: 1,
    explain: "This is the canonical Workflows pattern: relation connects the rows, rollup summarizes across the connection."
  },
  {
    q: "You can't remember which doc has the Q4 launch decisions. What's the fastest way to find it?",
    options: [
      "Use Ask AI to ask the question in plain language across your workspace",
      "Open every page in your sidebar one at a time",
      "Wait for a teammate to send you the link",
      "Create a new page and rebuild the decisions from memory"
    ],
    correct: 0,
    explain: "Ask AI (Cmd/Ctrl+J) searches across pages, docs, and database content with natural language — way faster than keyword guessing."
  },
];

let currentSlide = 0;
let visited = new Set([0]);
let testAnswers = new Array(QUIZ.length).fill(null);
let testSubmitted = false;

function renderSidebar() {
  const root = document.getElementById('sidebar-list');
  let html = '<div class="sidebar-label">Course outline</div>';

  for (const sec of SECTIONS) {
    const slidesInSec = SLIDES.map((s,i)=>({s,i})).filter(x=>x.s.section===sec.id);
    const visitedInSec = slidesInSec.filter(x=>visited.has(x.i)).length;
    html += `
      <details ${slidesInSec.some(x=>x.i===currentSlide)?'open':''}>
        <summary class="sidebar-item" style="font-weight:500;">
          <span class="chev">▾</span>
          <span class="emoji">${sec.emoji}</span>
          <span class="label">${sec.name}</span>
          <span class="num">${visitedInSec}/${slidesInSec.length}</span>
        </summary>
        <div class="sidebar-children">
          ${slidesInSec.map(x => `
            <div class="sidebar-item ${x.i===currentSlide?'active':''}" data-slide="${x.i}">
              <span class="chev"></span>
              <span class="emoji">${x.s.emoji}</span>
              <span class="label">${x.s.title}</span>
            </div>
          `).join('')}
        </div>
      </details>
    `;
  }
  root.innerHTML = html;

  root.querySelectorAll('.sidebar-item[data-slide]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      goTo(parseInt(el.dataset.slide));
    });
  });
}

function renderSlide() {
  const slide = SLIDES[currentSlide];
  const root = document.getElementById('presentation');
  const coverHtml = slide.cover ? `<div class="page-cover ${slide.cover}"></div>` : '';

  root.innerHTML = `
    <div class="page" key="${currentSlide}">
      ${coverHtml}
      <div class="page-icon">${slide.emoji}</div>
      <h1 class="page-title">${slide.title}</h1>
      ${slide.html}
    </div>
  `;

  const startBtn = document.getElementById('start-test-btn');
  if (startBtn) startBtn.addEventListener('click', openTest);

  document.getElementById('breadcrumb-current').textContent = slide.title;
  document.getElementById('slide-counter').textContent = `${currentSlide+1} / ${SLIDES.length}`;
  document.getElementById('progress-fill').style.width = (100*(currentSlide+1)/SLIDES.length)+'%';
  document.getElementById('prev-btn').disabled = currentSlide === 0;
  document.getElementById('next-btn').disabled = currentSlide === SLIDES.length - 1;
  document.getElementById('footer-progress').textContent = `${visited.size} / ${SLIDES.length} covered`;

  document.querySelector('.main').scrollTop = 0;
  renderSidebar();
}

function goTo(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  currentSlide = idx;
  visited.add(idx);
  if (!document.getElementById('test-view').classList.contains('hidden')) {
    closeTest();
  }
  renderSlide();
}

document.getElementById('prev-btn').addEventListener('click', ()=>goTo(currentSlide-1));
document.getElementById('next-btn').addEventListener('click', ()=>goTo(currentSlide+1));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.getElementById('test-view').classList.contains('hidden')) {
    if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); goTo(currentSlide+1); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goTo(currentSlide-1); }
  }
});

function openTest() {
  document.getElementById('present-topbar').classList.add('hidden');
  document.getElementById('presentation').classList.add('hidden');
  document.getElementById('test-topbar').classList.remove('hidden');
  document.getElementById('test-view').classList.remove('hidden');
  renderTest();
  document.querySelector('.main').scrollTop = 0;
}

function closeTest() {
  document.getElementById('present-topbar').classList.remove('hidden');
  document.getElementById('presentation').classList.remove('hidden');
  document.getElementById('test-topbar').classList.add('hidden');
  document.getElementById('test-view').classList.add('hidden');
}

document.getElementById('open-test-btn').addEventListener('click', openTest);
document.getElementById('back-to-presentation-btn').addEventListener('click', closeTest);

function renderTest() {
  const root = document.getElementById('test-view');
  let html = '';

  if (!testSubmitted) {
    html += `
      <div class="test-page">
        <div class="page-icon">🧪</div>
        <h1 class="page-title">Workflows 201 — Competency Test</h1>
        <div class="test-intro">
          <strong>10 questions · multiple choice · pass mark 7/10.</strong>
          <p style="margin:6px 0 0 0;">Pick the best answer for each. Pass this and you've got the Workflows path locked in.</p>
        </div>
    `;

    QUIZ.forEach((q, i) => {
      html += `
        <div class="question" data-q="${i}">
          <div class="q-num">Question ${i+1} of ${QUIZ.length}</div>
          <div class="q-text">${q.q}</div>
          <div class="options">
            ${q.options.map((opt, oi) => `
              <label class="option ${testAnswers[i]===oi?'selected':''}">
                <input type="radio" name="q${i}" value="${oi}" ${testAnswers[i]===oi?'checked':''}/>
                <span>${opt}</span>
              </label>
            `).join('')}
          </div>
        </div>
      `;
    });

    const answered = testAnswers.filter(a=>a!==null).length;
    html += `
        <div class="submit-row">
          <button class="submit-btn" id="submit-test-btn" ${answered<QUIZ.length?'disabled':''}>
            ${answered<QUIZ.length ? `Answer all questions (${answered}/${QUIZ.length})` : 'Submit answers'}
          </button>
          <span style="color: var(--text-tertiary); font-size:13.5px;">${answered}/${QUIZ.length} answered</span>
        </div>
      </div>
    `;
  } else {
    const score = testAnswers.reduce((s, a, i) => s + (a===QUIZ[i].correct?1:0), 0);
    const passed = score >= 7;
    const resultMsg = score === 10
      ? "Perfect score. You've got the Workflows path on lockdown."
      : passed
        ? "Solid pass — you're ready for the real Notion Academy quiz."
        : "Below the pass mark. Skim back through the slides and try again.";

    html += `
      <div class="test-page">
        <div class="page-icon">${score===10 ? '🏆' : passed ? '✅' : '📖'}</div>
        <h1 class="page-title">Your results</h1>
        <div class="results ${passed?'pass':'fail'}">
          <div class="score">${score} / 10</div>
          <h2>${passed ? (score===10 ? 'Perfect!' : 'Passed') : 'Not passed yet'}</h2>
          <p style="margin:4px 0 0 0;">${resultMsg}</p>
        </div>
        <h2>Review</h2>
    `;

    QUIZ.forEach((q, i) => {
      const userAns = testAnswers[i];
      const isRight = userAns === q.correct;
      html += `
        <div class="question">
          <div class="q-num">Question ${i+1} ${isRight ? '· ✅ correct' : '· ❌ incorrect'}</div>
          <div class="q-text">${q.q}</div>
          <div class="options">
            ${q.options.map((opt, oi) => {
              let cls = 'option';
              if (oi === q.correct) cls += ' reveal-correct';
              if (oi === userAns && !isRight) cls += ' incorrect';
              return `<label class="${cls}"><span style="width:16px; display:inline-block; text-align:center;">${oi===q.correct ? '✓' : (oi===userAns ? '✗' : '')}</span><span>${opt}</span></label>`;
            }).join('')}
          </div>
          <div class="explanation"><strong>Why:</strong> ${q.explain}</div>
        </div>
      `;
    });

    html += `
        <div class="submit-row">
          <button class="submit-btn" id="retake-btn">↻ Retake test</button>
          <button class="test-btn secondary" id="return-btn" style="padding:10px 20px; font-size:15px;">← Back to lesson</button>
        </div>
      </div>
    `;
  }

  root.innerHTML = html;

  if (!testSubmitted) {
    root.querySelectorAll('input[type="radio"]').forEach(input => {
      input.addEventListener('change', e => {
        const qIdx = parseInt(e.target.name.slice(1));
        testAnswers[qIdx] = parseInt(e.target.value);
        renderTest();
      });
    });
    const submit = document.getElementById('submit-test-btn');
    if (submit) {
      submit.addEventListener('click', () => {
        testSubmitted = true;
        renderTest();
        document.querySelector('.main').scrollTop = 0;
      });
    }
  } else {
    document.getElementById('retake-btn').addEventListener('click', () => {
      testSubmitted = false;
      testAnswers = new Array(QUIZ.length).fill(null);
      renderTest();
      document.querySelector('.main').scrollTop = 0;
    });
    document.getElementById('return-btn').addEventListener('click', closeTest);
  }
}

renderSlide();
</script>
